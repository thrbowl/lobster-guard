worker_processes auto;

env EDGE_ROUTES_FILE;
env LOBSTER_GUARD_EXCHANGE_URL;
env LOBSTER_GUARD_TOKEN;

events {
  worker_connections 4096;
}

http {
  lua_package_path "/etc/openresty/lua/?.lua;;";

  resolver 127.0.0.11 8.8.8.8 ipv6=off valid=30s;
  lua_shared_dict edge_routes_cache 10m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  init_by_lua_block {
    edge_routes = require "edge_routes"
  }

  init_worker_by_lua_block {
    local file = os.getenv("EDGE_ROUTES_FILE") or "/etc/lobster-guard/edge-routes.json"
    edge_routes.configure(file)
  }

  server {
    listen 80 default_server;

    client_body_buffer_size 512k;
    client_max_body_size 20m;

    location = /readyz {
      content_by_lua_block {
        local ok, err = edge_routes.ready()
        if not ok then
          ngx.status = 503
          ngx.say(err or "edge routes not ready")
          return
        end
        ngx.say("ok")
      }
    }

    location / {
      lua_need_request_body on;

      set $edge_upstream "";
      set $edge_mode "";
      set $edge_host_policy "";
      set $edge_route_id "";
      set $edge_project_id "";
      set $edge_project_name "";
      set $edge_proxy_pass "";

      rewrite_by_lua_block {
        local route, err = edge_routes.match(ngx.var.host, ngx.var.uri)
        if not route then
          ngx.status = 503
          ngx.say(err or "no edge route matched")
          return ngx.exit(503)
        end
        ngx.var.edge_upstream = route.upstream_url
        ngx.var.edge_mode = route.mode
        ngx.var.edge_host_policy = route.host_policy
        ngx.var.edge_route_id = route.id
        ngx.var.edge_project_id = route.project_id
        ngx.var.edge_project_name = route.project_name or ""
        ngx.var.edge_proxy_pass = os.getenv("LOBSTER_GUARD_EXCHANGE_URL") or "http://127.0.0.1:9090/__lobster/exchange"
        local token = os.getenv("LOBSTER_GUARD_TOKEN")

        if route.host_policy == "upstream_host" then
          ngx.req.set_header("Host", edge_routes.upstream_host(route.upstream_url))
        end
        if token and token ~= "" then
          ngx.req.set_header("Authorization", "Bearer " .. token)
        end
        ngx.req.set_header("X-Lobster-Route-ID", route.id)
        ngx.req.set_header("X-Lobster-Project-ID", route.project_id)
        ngx.req.set_header("X-Lobster-Project-Name", route.project_name or "")
        ngx.req.set_header("X-Lobster-Mode", route.mode)
        ngx.req.set_header("X-Lobster-Upstream-URL", route.upstream_url)
        ngx.req.set_header("X-Lobster-Original-URI", ngx.var.request_uri)
      }

      proxy_ssl_server_name on;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_connect_timeout 2s;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;

      error_page 502 503 504 = @edge_fail_open;

      proxy_pass $edge_proxy_pass;
    }

    location @edge_fail_open {
      proxy_ssl_server_name on;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass $edge_upstream;
    }
  }
}
