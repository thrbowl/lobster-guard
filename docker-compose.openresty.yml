services:
  openresty:
    image: openresty/openresty:alpine
    container_name: lobster-openresty
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      EDGE_ROUTES_FILE: /etc/lobster-guard/edge-routes.json
      LOBSTER_GUARD_EXCHANGE_URL: http://172.21.0.1:9090/__lobster/exchange
      LOBSTER_GUARD_TOKEN: "your-secret-token"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./deploy/openresty/lua:/etc/openresty/lua:ro
      - ./edge-routes.json:/etc/lobster-guard/edge-routes.json:ro
